<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* BASE DARK THEME */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* HEADER - Ingrandito */
        nav {
            background: #0a0a0a;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-weight: 900; font-size: 2.2rem; letter-spacing: 4px; color: #fff; }
        .cart-status { color: #00ff41; font-family: monospace; font-size: 1.5rem; font-weight: bold; }

        /* HERO - Ingrandito */
        .hero {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .hero h1 { font-size: 4rem; text-transform: uppercase; margin-bottom: 20px; letter-spacing: -1px; }
        .hero p { color: #888; font-size: 1.4rem; max-width: 800px; margin: 0 auto; }

        /* GRID - Più spaziosa */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
        }

        /* PRODUCT CARD - Formato XL */
        .card {
            background: #0a0a0a;
            border: 2px solid #222;
            border-radius: 20px;
            padding: 40px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .card:hover {
            border-color: #00d1ff;
            background: #111;
            transform: translateY(-10px);
        }
        .img-box {
            height: 300px;
            background: #050505;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
            border: 2px dashed #333;
            text-transform: uppercase;
        }
        .card h3 { font-size: 2rem; margin-bottom: 10px; letter-spacing: 1px; }
        .price { font-size: 2.5rem; margin: 25px 0; font-weight: 900; color: #fff; }

        /* BUTTONS - Dimensioni Ultra */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-cart {
            background: #fff; color: #000; border: none;
            padding: 25px; border-radius: 12px; font-weight: 900;
            font-size: 1.4rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-cart:active { transform: scale(0.97); }
        
        .btn-xr {
            background: transparent; color: #00d1ff;
            border: 2px solid #00d1ff; padding: 20px;
            border-radius: 12px; font-weight: 700; 
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-xr:hover { background: rgba(0, 209, 255, 0.1); color: #fff; }

        /* LOG OVERLAY */
        #xr-log {
            position: fixed; bottom: 20px; left: 20px;
            font-size: 1rem; color: #00ff41; font-family: monospace;
            pointer-events: none;
            background: rgba(0,0,0,0.7);
            padding: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">XRi WEAR</div>
        <div class="cart-status">CARRELLO: [<span id="count">0</span>]</div>
    </nav>

    <div class="hero">
        <h1>Tech Collection 2026</h1>
        <p>L'avanguardia del vestire. Esplora i modelli in realtà estesa direttamente dal tuo browser.</p>
    </div>

    <div class="container">
        <div class="product-grid">
            
            <div class="card">
                <div class="img-box">Tech Giubotto v1</div>
                <h3>GIUBOTTO XR-1</h3>
                <div class="price">€ 189.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">AGGIUNGI AL CARRELLO</button>
                    <button class="btn-xr" onclick="startXR('giubotto_01')">VISUALIZZA IN XR</button>
                </div>
            </div>

            <div class="card">
                <div class="img-box">Pantaloni Cargo G2</div>
                <h3>PANTALONI TECH</h3>
                <div class="price">€ 120.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">AGGIUNGI AL CARRELLO</button>
                    <button class="btn-xr" onclick="startXR('pantaloni_02')">VISUALIZZA IN XR</button>
                </div>
            </div>

            <div class="card">
                <div class="img-box">Maglia Seamless</div>
                <h3>MAGLIA COMPRESS</h3>
                <div class="price">€ 55.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">AGGIUNGI AL CARRELLO</button>
                    <button class="btn-xr" onclick="startXR('maglia_03')">VISUALIZZA IN XR</button>
                </div>
            </div>

        </div>
    </div>

    <div id="xr-log"></div>

    <script>
        let cart = 0;
        
        function updateCart() {
            cart++;
            document.getElementById('count').innerText = cart;
        }

        function startXR(productId) {
            const log = document.getElementById('xr-log');
            log.innerText = ">> System: Inizializzazione XR per " + productId + "...";
            
            if(window.XRi && XRi.onProductView) {
                XRi.onProductView(productId);
            }

            setTimeout(() => {
                alert("ATTIVAZIONE VISORE IN CORSO...\nProdotto: " + productId.toUpperCase());
            }, 100);
        }
    </script>
</body>
</html>
