<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://xri.onl/XRi.js"></script>
    
    <style>
        /* BASE DARK THEME */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* HEADER */
        nav {
            background: #0a0a0a;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-weight: 900; font-size: 2.2rem; letter-spacing: 4px; color: #fff; }
        .cart-status { color: #00ff41; font-family: monospace; font-size: 1.5rem; font-weight: bold; }

        /* HERO */
        .hero {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .hero h1 { font-size: 4rem; text-transform: uppercase; margin-bottom: 20px; letter-spacing: -1px; }
        .hero p { color: #888; font-size: 1.4rem; max-width: 800px; margin: 0 auto; }

        /* GRID */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
        }

        /* PRODUCT CARD XL */
        .card {
            background: #0a0a0a;
            border: 2px solid #222;
            border-radius: 20px;
            padding: 40px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .card:hover {
            border-color: #00d1ff;
            background: #111;
            transform: translateY(-10px);
        }
        
        /* BOX IMMAGINE REALE */
        .img-box {
            height: 400px; /* Aumentato per valorizzare l'immagine */
            background: #050505;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 1px solid #222;
            overflow: hidden;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene le proporzioni della giacca */
            transition: transform 0.5s ease;
        }
        .card:hover .img-box img {
            transform: scale(1.1);
        }

        .card h3 { font-size: 2rem; margin-bottom: 10px; letter-spacing: 1px; }
        .price { font-size: 2.5rem; margin: 25px 0; font-weight: 900; color: #fff; }

        /* BUTTONS ULTRA */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        
        .btn-cart {
            background: #fff; color: #000; border: none;
            padding: 25px; border-radius: 12px; font-weight: 900;
            font-size: 1.4rem; cursor: pointer;
            text-transform: uppercase;
        }
        
        .btn-xr {
            background: transparent; color: #00d1ff;
            border: 2px solid #00d1ff; padding: 20px;
            border-radius: 12px; font-weight: 700; 
            font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-xr:hover { background: #00d1ff; color: #000; }

        /* LOG OVERLAY */
        #xr-status {
            position: fixed; bottom: 20px; left: 20px;
            font-size: 1rem; color: #00ff41; font-family: monospace;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">XRi WEAR</div>
        <div class="cart-status">CARRELLO: [<span id="count">0</span>]</div>
    </nav>

    <div class="hero">
        <h1>Tech Collection 2026</h1>
        <p>Visualizza i capi in Realtà Aumentata con la tecnologia XRi.</p>
    </div>

    <div class="container">
        <div class="product-grid">
            
            <div class="card">
                <div class="img-box">
                    <img src="https://simonevetere.github.io/XRi-ecommerce/assets/img/jacket.png" alt="Tech Jacket">
                </div>
                <h3>GIUBOTTO XR-1</h3>
                <div class="price">€ 189.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">AGGIUNGI AL CARRELLO</button>
                    <button class="btn-xr" onclick="launchXR('https://raw.githubusercontent.com/simonevetere/XRi-ecommerce/main/assets/3d/jacket.glb')">VEDI IN 3D / XR</button>
                </div>
            </div>
            <div class="card">
                <div class="img-box">
                    <img src="https://simonevetere.github.io/XRi-ecommerce/assets/img/trousers.png" alt="Tech Jacket">
                </div>
                <h3>PANTS</h3>
                <div class="price">€ 189.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">AGGIUNGI AL CARRELLO</button>
                    <button class="btn-xr" onclick="launchXR('https://raw.githubusercontent.com/simonevetere/XRi-ecommerce/main/assets/3d/trousers.glb')">VEDI IN 3D / XR</button>
                </div>
            </div>
            <div class="card">
                <div class="img-box">
                    <img src="https://simonevetere.github.io/XRi-ecommerce/assets/img/t-shirt.png" alt="Tech Jacket">
                </div>
                <h3>t-shirt</h3>
                <div class="price">€ 189.00</div>
                <div class="btn-group">
                    <button class="btn-cart" onclick="updateCart()">AGGIUNGI AL CARRELLO</button>
                    <button class="btn-xr" onclick="launchXR('https://raw.githubusercontent.com/simonevetere/XRi-ecommerce/main/assets/3d/t-shirt.glb')">VEDI IN 3D / XR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="xr-status"></div>

    <script>
    async function launchXR(modelPath) {
        
        // Verifichiamo che la libreria del visore sia pronta
        if (typeof XRi !== 'undefined') {
           XRi.spawn("prod_1", modelPath, 1.5, { x: 0, y: 1, z: 0.5 },{ x: 0, y: 180, z: 0 }, true);
        }
    };

    function updateCart () {
        let countEl = document.getElementById('count');
        let current = parseInt(countEl.innerText);
        countEl.innerText = current + 1;
    };
XRi.initMultiplayer();
XRi.clearAll();
</script>
</body>
</html>
